    Student Mentorship:
      - name: "Matthew Sun (Ph.D. Student, Computer Science) — Columbia University | Jan 2026 – May 2026"
        summary: "Mentored Matthew on applying machine learning approaches to RNA splice-site usage prediction, focusing on data preprocessing and quantitative modeling to improve splice-site usage quantification, supporting disease-relevant variant interpretation."

      - name: "Luna Segarra Alonzo (Ph.D. Student) — University of Puerto Rico | Jun 2025 – Aug 2025"
        summary: "Mentored Luna to approach RNA rewriting as a system-level regulatory design problem, emphasizing hypothesis-driven modeling, modular system architecture, and rigorous mechanistic validation. <span style=\"color: var(--global-theme-color)\">Resulted in a presentation at the Puerto Rico Neuroscience Conference.</span>"

      - name: "Shiwei Liu (Ph.D. Student) — Tsinghua University | Feb 2020 – Aug 2020"
        summary: "Guided Shiwei to model the encoding system as a layered architecture integrating constraint-aware encoding, probabilistic noise modeling, and fuzzy retrieval algorithms, enabling tolerant matching and error-resilient addressing. <span style=\"color: var(--global-theme-color)\">Advanced into a peer-reviewed publication: *Biochemical Constraint Compatible Address Design for Fuzzy Retrieval of Images in DNA Storage* (CAC 2020, IEEE).</span>"

      - name: "Lekang Yuan (Ph.D. Student) — Tsinghua University | Aug 2019 – Aug 2020"
        summary: "Guided Lekang to design computational pipelines combining probabilistic modeling and data-driven error learning. <span style=\"color: var(--global-theme-color)\">Served as team leader of the Tsinghua-A iGEM 2020 DNA storage project (Bronze Medal), leading to patent CN114023374B.</span>"

