  summary: >
    I am a postdoctoral research scientist in the laboratory of Prof. Chaolin Zhang at the Irving Medical
    Center of Columbia University. My long-term research interests involve developing programmable RNA-based
    therapeutic technologies to correct disease-causing mutations and enable scalable precision medicine for
    genetic and neurodegenerative disorders. My work is grounded in a learn-from-nature philosophy, drawing
    inspiration from natural RNA regulatory systems and translating their principles into engineered
    therapeutic platforms through bio-inspired design and AI-accelerated biological engineering.

